<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book professional legal consultations online with expert lawyers in all legal fields. Affordable rates, convenient Zoom sessions, and trusted advice for individuals and businesses.">
    <meta name="keywords" content="legal consultations, online lawyer, legal advice, affordable legal services, book legal consultation, family law, immigration law, commercial law, corporate legal advice, virtual legal consultation">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="assets/images/icon.png">
    <title>Payment - Consultations</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <img src="assets/images/logo.png" alt="logo">
                    <a href="index.html">Consultations</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="section">
        <div class="container">
            <div class="auth-card">
                <h2>Complete Payment</h2>
                
                <div id="cartSummary" style="margin:2rem 0;">
                    <h3>Booking Summary</h3>
                    <div id="cartItems"></div>
                    <div class="total-box" id="totalDisplay"></div>
                </div>

                <div id="card-element"></div>
                <div id="card-errors" style="color:var(--danger); margin-top:0.5rem;"></div>

                <button onclick="handlePayment()" class="btn-primary btn-block" style="margin-top:2rem;">
                    Pay Now
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="loader" class="loader" style="display:none;"><div class="spinner"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js?v=2"></script>
    <script src="assets/js/utils.js?v=2"></script>
    <script src="assets/js/auth.js?v=2"></script>
    <script defer>
        protectPage();
        
        const stripe = Stripe(STRIPE_PUBLIC_KEY);
        const elements = stripe.elements();
        const cardElement = elements.create('card');
        cardElement.mount('#card-element');

        async function loadCart() {
            try {
                const response = await axios.get(API.cart);
                const cart = response.data;
                
                if (!cart.items || cart.items.length === 0) {
                    window.location.href = 'index.html';
                    return;
                }

                document.getElementById('cartItems').innerHTML = cart.items.map(item => {
                    const itemData = JSON.stringify(item).replace(/'/g, "&apos;");
                    return `
                    <div style="display:flex; justify-content:space-between; padding:0.5rem 0;" data-item-id="${item.id}">
                        <span>${item.category_name} - ${item.duration}min</span>
                        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;"
                         data-item='${JSON.stringify(itemData)}'>
                            <strong>$${item.computed_price}</strong>
                            <button onclick="editItem(this)" class="customize-btn edit-btn" >
                                &#9998;
                            </button>
                            <button onclick="removeFromCart(${item.id})" class="customize-btn delete-btn">
                                &times;
                            </button>
                        </div>
                    </div>
                `}).join('');
                
                document.getElementById('totalDisplay').innerHTML = `
                    <span>Total:</span>
                    <strong>$${cart.total}</strong>
                `;
            } catch (error) {
                showToast('Failed to load cart', 'error');
            }
        }

        // Remove a specific item from cart
        async function removeFromCart(itemId) {
            showLoader();
            try {
                await axios.delete(`${API.updateItemFromCart}${itemId}`);
                showToast('Removed from cart successfully!');
                await loadCart();
            } catch (error) {
                showToast('Failed to remove item from cart', 'error');
            }
            hideLoader();
        }
        
        // Redirect to updating.html page
        function editItem(btn) {
            const item = JSON.parse(btn.parentElement.dataset.item);
            localStorage.setItem('editItem', item);
            window.location.href = 'updating.html';
        }

        async function handlePayment() {
            showLoader();
            try {
                const checkoutRes = await axios.post(API.checkout);
                const { client_secret } = checkoutRes.data;
                
                const { error, paymentIntent } = await stripe.confirmCardPayment(client_secret, {
                    payment_method: { card: cardElement }
                });
                
                hideLoader();
                
                if (error) {
                    showToast(error.message, 'error');
                } else if (paymentIntent.status === 'succeeded') {
                    showToast('Payment successful!');
                    setTimeout(() => window.location.href = 'profile.html', 2000);
                }
            } catch (error) {
                hideLoader();
                showToast('Payment failed', 'error');
            }
        }

        loadCart();
    </script>
</body>
</html>
