<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book professional legal consultations online with expert lawyers in all legal fields. Affordable rates, convenient Zoom sessions, and trusted advice for individuals and businesses.">
    <meta name="keywords" content="legal consultations, online lawyer, legal advice, affordable legal services, book legal consultation, family law, immigration law, commercial law, corporate legal advice, virtual legal consultation">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="assets/images/icon.png">
    <title>Payment - Consultations</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <img src="assets/images/logo.png" alt="logo">
                    <a href="index.html">Consultations</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="section">
        <div class="container">
            <div class="auth-card">
                <h2>Complete Payment</h2>
                
                <div id="cartSummary" style="margin:2rem 0;">
                    <h3>Booking Summary</h3>
                    <div id="cartItems"></div>
                    <div class="total-box" id="totalDisplay"></div>
                </div>

                <div id="card-element"></div>
                <div id="card-errors" style="color:var(--danger); margin-top:0.5rem;"></div>

                <button onclick="handlePayment()" class="btn-primary btn-block" style="margin-top:2rem;">
                    Pay Now
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="loader" class="loader" style="display:none;"><div class="spinner"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js?v=2"></script>
    <script src="assets/js/utils.js?v=2"></script>
    <script src="assets/js/auth.js?v=2"></script>
    <script src="assets/js/payment.js"></script>
</body>
</html>
