<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Consultations</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <a href="index.html" class="logo">⚖️ Consultations</a>
            </div>
        </div>
    </nav>

    <div class="section">
        <div class="container">
            <div class="auth-card">
                <h2>Complete Payment</h2>
                
                <div id="cartSummary" style="margin:2rem 0;">
                    <h3>Booking Summary</h3>
                    <div id="cartItems"></div>
                    <div class="total-box" id="totalDisplay"></div>
                </div>

                <div id="card-element"></div>
                <div id="card-errors" style="color:var(--danger); margin-top:0.5rem;"></div>

                <button onclick="handlePayment()" class="btn-primary btn-block" style="margin-top:2rem;">
                    Pay Now
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="loader" class="loader" style="display:none;"><div class="spinner"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js?v=2"></script>
    <script src="assets/js/utils.js?v=2"></script>
    <script src="assets/js/auth.js?v=2"></script>
    <script>
        protectPage();
        
        const stripe = Stripe(STRIPE_PUBLIC_KEY);
        const elements = stripe.elements();
        const cardElement = elements.create('card');
        cardElement.mount('#card-element');

        async function loadCart() {
            try {
                const response = await axios.get(API.cart);
                const cart = response.data;
                
                if (!cart.items || cart.items.length === 0) {
                    window.location.href = 'index.html';
                    return;
                }
                
                document.getElementById('cartItems').innerHTML = cart.items.map(item => `
                    <div style="display:flex; justify-content:space-between; padding:0.5rem 0;">
                        <span>${item.category_name} - ${item.duration}min</span>
                        <strong>$${item.computed_price}</strong>
                    </div>
                `).join('');
                
                document.getElementById('totalDisplay').innerHTML = `
                    <span>Total:</span>
                    <strong>$${cart.total}</strong>
                `;
            } catch (error) {
                showToast('Failed to load cart', 'error');
            }
        }

        async function handlePayment() {
            showLoader();
            try {
                const checkoutRes = await axios.post(API.checkout);
                const { client_secret } = checkoutRes.data;
                
                const { error, paymentIntent } = await stripe.confirmCardPayment(client_secret, {
                    payment_method: { card: cardElement }
                });
                
                hideLoader();
                
                if (error) {
                    showToast(error.message, 'error');
                } else if (paymentIntent.status === 'succeeded') {
                    showToast('Payment successful!');
                    setTimeout(() => window.location.href = 'profile.html', 2000);
                }
            } catch (error) {
                hideLoader();
                showToast('Payment failed', 'error');
            }
        }

        loadCart();
    </script>
</body>
</html>
