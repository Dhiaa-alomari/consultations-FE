<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book professional legal consultations online with expert lawyers in all legal fields. Affordable rates, convenient Zoom sessions, and trusted advice for individuals and businesses.">
    <meta name="keywords" content="legal consultations, online lawyer, legal advice, affordable legal services, book legal consultation, family law, immigration law, commercial law, corporate legal advice, virtual legal consultation">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="assets/images/icon.png">
    <title>Login - Consultations</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <img src="assets/images/logo.png" alt="logo">
                    <a href="index.html">Consultations</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="section">
        <div class="container">
            <div class="auth-card">
                <h2 style="text-align:center; margin-bottom:2rem;">Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username or Email *</label>
                        <input type="text" id="username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password *</label>
                        <input type="password" id="password" autocomplete="off" required>
                    </div>

                    <button type="submit" class="btn-primary btn-block">Login</button>
                </form>

                <p style="text-align:center; margin-top:1rem;">
                    Don't have an account? <a href="register.html">Register</a>
                </p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="loader" class="loader" style="display:none;">
        <div class="spinner"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js?v=2"></script>
    <script src="assets/js/utils.js?v=2"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            
            showLoader();
            try {
                const response = await axios.post(API.login, data);
                localStorage.setItem('access_token', response.data.tokens.access);
                localStorage.setItem('refresh_token', response.data.tokens.refresh);
                localStorage.setItem('user', JSON.stringify(response.data.user));
                
                hideLoader();
                showToast('Login successful!');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (error) {
                hideLoader();
                const msg = error.response?.data?.error || 'Login failed';
                showToast(msg, 'error');
            }
        });
    </script>
</body>
</html>
