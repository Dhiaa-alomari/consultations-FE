<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book professional legal consultations online with expert lawyers in all legal fields. Affordable rates, convenient Zoom sessions, and trusted advice for individuals and businesses.">
    <meta name="keywords" content="legal consultations, online lawyer, legal advice, affordable legal services, book legal consultation, family law, immigration law, commercial law, corporate legal advice, virtual legal consultation">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="assets/images/icon.png">
    <title>Profile - Consultations</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <img src="assets/images/logo.png" alt="logo">
                    <a href="index.html">Consultations</a>
                </div>
                <div class="nav-menu">
                    <a href="index.html">Home</a>
                    <a href="profile.html">Profile</a>
                    <button onclick="handleLogout()" class="btn-logout">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <!--Profile Header-->
        <div class="profile-header">
            <div class="avatar-upload">
                <img id="avatarImg" class="avatar-img" src="https://ui-avatars.com/api/?name=User&size=150" alt="Avatar">
                <label class="avatar-input" for="avatarInput">📷</label>
                <input type="file" id="avatarInput" accept="image/*" style="display:none;">
            </div>
            <h2 id="userName">Loading...</h2>
            <p id="userEmail"></p>
        </div>

        <!--Profile Update Form-->
        <div class="auth-card">
            <h3>Update Profile</h3>
            <form id="profileForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name">
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name">
                    </div>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone">
                </div>
                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" rows="3"></textarea>
                </div>
                <button type="submit" class="btn-primary btn-block">Update Profile</button>
            </form>
        </div>

        <!--Change Password Form-->
        <div class="auth-card" style="margin-top:2rem;">
            <h3>Change Password</h3>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="old_password">Current Password *</label>
                    <input type="password" id="old_password" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label for="new_password">New Password *</label>
                    <input type="password" id="new_password" autocomplete="off" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password *</label>
                    <input type="password" id="confirm_password" autocomplete="off" required>
                </div>
                <button type="submit" class="btn-primary btn-block">Change Password</button>
            </form>
        </div>
        
        <!--Appointments Table-->
        <div class="appointments-table" id="appointmentsTable" style="margin-top:2rem;">
            <h3 style="padding:1rem;">My Appointments</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Service</th>
                        <th>Duration</th>
                        <th>Price</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="appointmentsBody">
                    <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <!--Delete Account Form-->
        <div class="auth-card" style="margin-top:2rem;">
            <div class="delete-header">
                <h3>Delete Your Account</h3>
                <span class="show-delete-form customize-btn">+</span>
            </div>
            <form id="deleteAccountForm" style="display:none; margin-top:1rem;">
                <div class="form-group">
                    <label for="delete_password">Enter Your Password *</label>
                    <input type="password" id="delete_password" autocomplete="off" required>
                </div>
                <button type="submit" class="btn-primary btn-block" style="background:red">
                    Delete account
                </button>
            </form>
        </div>

    </div>

    <div id="toast" class="toast"></div>
    <div id="loader" class="loader" style="display:none;"><div class="spinner"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/config.js?v=2"></script>
    <script src="assets/js/utils.js?v=2"></script>
    <script src="assets/js/auth.js?v=2"></script>
    <script src="assets/js/profile.js"></script>
</body>
</html>
